<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My First Website</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Hello, World!</h1>
    <p>This is my first website, hosted on Azure Static Web Apps.</p>
  </header>

  <main>
    <button id="greet-btn">Click me</button>
    <p id="greet-output"></p>
  </main>

  <section id="pl-table-section">
    <h2>Premier League Table</h2>
    <p id="pl-table-status">Loading standings&hellip;</p>
    <table id="pl-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Team</th>
          <th>P</th>
          <th>W</th>
          <th>D</th>
          <th>L</th>
          <th>GD</th>
          <th>Pts</th>
        </tr>
      </thead>
      <tbody id="pl-table-body"></tbody>
    </table>
  </section>

  <script src="script.js"></script>
</body>
</html>
